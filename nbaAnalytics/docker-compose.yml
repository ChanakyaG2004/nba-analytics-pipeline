version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: nba_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d nba_db"]
      interval: 5s
      timeout: 5s
      retries: 5
  mlflow:
    image: ghcr.io/mlflow/mlflow
    ports:
      - "5001:5000"
    command: mlflow server --host 0.0.0.0