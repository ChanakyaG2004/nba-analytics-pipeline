services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: nba_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d nba_db"]
      interval: 5s
      timeout: 5s
      retries: 5
  api:
    build: .
    environment:
      MODEL_PATH: models/nba_xgb_win_probability.json
      DATABASE_URL: postgresql://admin:password123@db:5432/nba_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
  dashboard:
    build: .
    command: streamlit run src/app.py --server.address 0.0.0.0 --server.port 8501
    environment:
      DATABASE_URL: postgresql://admin:password123@db:5432/nba_db
    ports:
      - "8501:8501"
    depends_on:
      db:
        condition: service_healthy
  mlflow:
    image: ghcr.io/mlflow/mlflow
    ports:
      - "5001:5000"
    command: mlflow server --host 0.0.0.0
